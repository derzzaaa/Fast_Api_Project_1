services:
  db:
    image: postgres:15-alpine
    container_name: coffee_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-Fast}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: coffee_redis
    restart: always
    ports:
      - "6379:6379"

  client-app:
    build: .
    container_name: coffee_client_app
    restart: always
    command: python run_back.py
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-Fast}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - HOST=0.0.0.0
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - redis

  staff-app:
    build: .
    container_name: coffee_staff_app
    restart: always
    command: python -m staff.back.main
    ports:
      - "8500:8500"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-Fast}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - FLET_PORT=8500
      - PYTHONUNBUFFERED=1
    depends_on:
      - db
      - redis

volumes:
  postgres_data: